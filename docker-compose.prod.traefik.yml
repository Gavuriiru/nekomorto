services:
  app:
    labels:
      traefik.enable: "true"
      traefik.http.middlewares.nekomorto-security-headers.headers.contentTypeNosniff: "true"
      traefik.http.middlewares.nekomorto-security-headers.headers.customFrameOptionsValue: "SAMEORIGIN"
      traefik.http.middlewares.nekomorto-security-headers.headers.referrerPolicy: strict-origin-when-cross-origin
      traefik.http.middlewares.nekomorto-security-headers.headers.stsIncludeSubdomains: "true"
      traefik.http.middlewares.nekomorto-security-headers.headers.stsPreload: "true"
      traefik.http.middlewares.nekomorto-security-headers.headers.stsSeconds: "31536000"
      traefik.http.middlewares.nekomorto-www-redirect.redirectregex.permanent: "true"
      traefik.http.middlewares.nekomorto-www-redirect.redirectregex.regex: ^https://${APP_WWW_DOMAIN}/(.*)
      traefik.http.middlewares.nekomorto-www-redirect.redirectregex.replacement: https://${APP_DOMAIN}/$${1}
      traefik.http.routers.nekomorto-app.entrypoints: websecure
      traefik.http.routers.nekomorto-app.rule: Host(`${APP_DOMAIN}`)
      traefik.http.routers.nekomorto-app.middlewares: nekomorto-security-headers
      traefik.http.routers.nekomorto-app.service: nekomorto-app
      traefik.http.routers.nekomorto-app.tls: "true"
      traefik.http.routers.nekomorto-app.tls.certresolver: letsencrypt
      traefik.http.routers.nekomorto-www.entrypoints: websecure
      traefik.http.routers.nekomorto-www.middlewares: nekomorto-www-redirect
      traefik.http.routers.nekomorto-www.rule: Host(`${APP_WWW_DOMAIN}`)
      traefik.http.routers.nekomorto-www.service: noop@internal
      traefik.http.routers.nekomorto-www.tls: "true"
      traefik.http.routers.nekomorto-www.tls.certresolver: letsencrypt
      traefik.http.services.nekomorto-app.loadbalancer.server.port: "8080"

  edge:
    image: traefik:v3.0
    container_name: nekomorto-edge
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.letsencrypt.acme.email=${TRAEFIK_ACME_EMAIL}
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.letsencrypt.acme.httpchallenge=true
      - --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_data:/letsencrypt
    networks:
      - nekomorto_internal
    logging:
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  traefik_data:
    name: nekomorto-traefik-data
