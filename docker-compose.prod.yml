name: nekomorto-prod

services:
  postgres:
    image: postgres:16-alpine
    container_name: nekomorto-postgres-prod
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nekomorto}
      POSTGRES_USER: ${POSTGRES_USER:-nekomorto_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      TZ: UTC
      PGTZ: UTC
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nekomorto_app} -d ${POSTGRES_DB:-nekomorto}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - nekomorto_internal
    logging:
      options:
        max-size: "10m"
        max-file: "5"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${APP_IMAGE_REPO:-ghcr.io/nekomatasub/nekomorto}:${APP_IMAGE_TAG:-latest}
    container_name: nekomorto-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ${ENV_FILE:-.env.prod}
    environment:
      NODE_ENV: production
      PORT: 8080
    expose:
      - "8080"
    volumes:
      - uploads_data:/app/public/uploads
    healthcheck:
      test: ["CMD", "node", "scripts/check-health.mjs", "--base=http://127.0.0.1:8080", "--expect-source=db"]
      interval: 20s
      timeout: 5s
      retries: 6
      start_period: 40s
    networks:
      - nekomorto_internal
    logging:
      options:
        max-size: "10m"
        max-file: "5"
    # Labels Traefik: inofensivas quando Traefik nao esta ativo.
    # Traefik Docker provider le labels dos servicos de backend.
    labels:
      traefik.enable: "true"
      traefik.http.middlewares.nekomorto-security-headers.headers.contentTypeNosniff: "true"
      traefik.http.middlewares.nekomorto-security-headers.headers.customFrameOptionsValue: "SAMEORIGIN"
      traefik.http.middlewares.nekomorto-security-headers.headers.referrerPolicy: strict-origin-when-cross-origin
      traefik.http.middlewares.nekomorto-security-headers.headers.stsIncludeSubdomains: "true"
      traefik.http.middlewares.nekomorto-security-headers.headers.stsPreload: "true"
      traefik.http.middlewares.nekomorto-security-headers.headers.stsSeconds: "31536000"
      traefik.http.middlewares.nekomorto-www-redirect.redirectregex.permanent: "true"
      traefik.http.middlewares.nekomorto-www-redirect.redirectregex.regex: ^https://${APP_WWW_DOMAIN}/(.*)
      traefik.http.middlewares.nekomorto-www-redirect.redirectregex.replacement: https://${APP_DOMAIN}/$${1}
      traefik.http.routers.nekomorto-app.entrypoints: websecure
      traefik.http.routers.nekomorto-app.rule: Host(`${APP_DOMAIN}`)
      traefik.http.routers.nekomorto-app.middlewares: nekomorto-security-headers
      traefik.http.routers.nekomorto-app.service: nekomorto-app
      traefik.http.routers.nekomorto-app.tls: "true"
      traefik.http.routers.nekomorto-app.tls.certresolver: letsencrypt
      traefik.http.routers.nekomorto-www.entrypoints: websecure
      traefik.http.routers.nekomorto-www.middlewares: nekomorto-www-redirect
      traefik.http.routers.nekomorto-www.rule: Host(`${APP_WWW_DOMAIN}`)
      traefik.http.routers.nekomorto-www.service: noop@internal
      traefik.http.routers.nekomorto-www.tls: "true"
      traefik.http.routers.nekomorto-www.tls.certresolver: letsencrypt
      traefik.http.services.nekomorto-app.loadbalancer.server.port: "8080"

  # ---------------------------------------------------------------------------
  # Caddy: proxy reverso com TLS automatico via Let's Encrypt.
  # Ativado com:  COMPOSE_PROFILES=caddy  ou  --profile caddy
  # ---------------------------------------------------------------------------
  edge-caddy:
    image: caddy:2-alpine
    container_name: nekomorto-edge
    restart: unless-stopped
    profiles: ["caddy"]
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    environment:
      APP_DOMAIN: ${APP_DOMAIN}
      APP_WWW_DOMAIN: ${APP_WWW_DOMAIN}
    volumes:
      - ./ops/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - nekomorto_internal
    logging:
      options:
        max-size: "10m"
        max-file: "5"

  # ---------------------------------------------------------------------------
  # Nginx: proxy reverso com TLS via certificados fornecidos.
  # Ativado com:  COMPOSE_PROFILES=nginx  ou  --profile nginx
  # ---------------------------------------------------------------------------
  edge-nginx:
    image: nginx:1.27-alpine
    container_name: nekomorto-edge
    restart: unless-stopped
    profiles: ["nginx"]
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    environment:
      APP_DOMAIN: ${APP_DOMAIN}
      APP_WWW_DOMAIN: ${APP_WWW_DOMAIN}
    volumes:
      - ./ops/nginx/default.conf.template:/etc/nginx/templates/default.conf.template:ro
      - ${NGINX_TLS_CERT_PATH}:/etc/nginx/certs/app.crt:ro
      - ${NGINX_TLS_KEY_PATH}:/etc/nginx/certs/app.key:ro
    networks:
      - nekomorto_internal
    logging:
      options:
        max-size: "10m"
        max-file: "5"

  # ---------------------------------------------------------------------------
  # Traefik: proxy reverso com TLS via ACME/Let's Encrypt.
  # Ativado com:  COMPOSE_PROFILES=traefik  ou  --profile traefik
  # ---------------------------------------------------------------------------
  edge-traefik:
    image: traefik:v3.0
    container_name: nekomorto-edge
    restart: unless-stopped
    profiles: ["traefik"]
    depends_on:
      app:
        condition: service_healthy
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.letsencrypt.acme.email=${TRAEFIK_ACME_EMAIL}
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.letsencrypt.acme.httpchallenge=true
      - --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_data:/letsencrypt
    networks:
      - nekomorto_internal
    logging:
      options:
        max-size: "10m"
        max-file: "5"

networks:
  nekomorto_internal:
    name: nekomorto-internal

volumes:
  postgres_data:
    name: nekomorto-postgres-prod-data
  uploads_data:
    name: nekomorto-uploads-prod-data
  caddy_data:
    name: nekomorto-caddy-data
  caddy_config:
    name: nekomorto-caddy-config
  traefik_data:
    name: nekomorto-traefik-data
