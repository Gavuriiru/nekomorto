services:
  edge:
    image: nginx:1.27-alpine
    container_name: nekomorto-edge
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    environment:
      APP_DOMAIN: ${APP_DOMAIN}
      APP_WWW_DOMAIN: ${APP_WWW_DOMAIN}
    volumes:
      - ./ops/nginx/default.conf.template:/etc/nginx/templates/default.conf.template:ro
      - ${NGINX_TLS_CERT_PATH}:/etc/nginx/certs/app.crt:ro
      - ${NGINX_TLS_KEY_PATH}:/etc/nginx/certs/app.key:ro
    networks:
      - nekomorto_internal
    logging:
      options:
        max-size: "10m"
        max-file: "5"
