name: Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Optional image tag to deploy (latest or sha-<40hex>). Leave empty to deploy current commit."
        required: false
        type: string

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  quality:
    if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.image_tag == '') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.14.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run typecheck
        run: npm run typecheck

      - name: Run accessibility gate
        run: npm run test:a11y

  ts7_preview:
    if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.image_tag == '') }}
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.14.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript 7 preview typecheck
        run: npm run typecheck:ts7-preview

  build_and_push:
    needs:
      - quality
    if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.image_tag == '') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve build metadata
        id: build-meta
        shell: bash
        run: |
          echo "commit_sha=${GITHUB_SHA}" >> "${GITHUB_OUTPUT}"
          echo "build_time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "${GITHUB_OUTPUT}"

      - name: Build and push app image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          build-args: |
            APP_COMMIT_SHA=${{ steps.build-meta.outputs.commit_sha }}
            APP_BUILD_TIME=${{ steps.build-meta.outputs.build_time }}
            VITE_APP_COMMIT_SHA=${{ steps.build-meta.outputs.commit_sha }}
            VITE_APP_BUILD_TIME=${{ steps.build-meta.outputs.build_time }}
          tags: |
            ghcr.io/gavuriiru/nekomorto:latest
            ghcr.io/gavuriiru/nekomorto:sha-${{ github.sha }}

  deploy:
    needs:
      - quality
      - build_and_push
    if: ${{ always() && (needs.quality.result == 'success' || needs.quality.result == 'skipped') && (needs.build_and_push.result == 'success' || needs.build_and_push.result == 'skipped') }}
    uses: ./.github/workflows/deploy-prod-reusable.yml
    secrets: inherit
    with:
      image_tag: ${{ github.event.inputs.image_tag || '' }}
