name: Build and Publish Production Image

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24.14.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run typecheck
        run: npm run typecheck

      - name: Run accessibility gate
        run: npm run test:a11y

  ts7_preview:
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24.14.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript 7 preview typecheck
        run: npm run typecheck:ts7-preview

  build_and_push:
    needs:
      - quality
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve build metadata
        id: build-meta
        shell: bash
        run: |
          echo "commit_sha=${GITHUB_SHA}" >> "${GITHUB_OUTPUT}"
          echo "build_time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "${GITHUB_OUTPUT}"

      - name: Build and push app image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          build-args: |
            APP_COMMIT_SHA=${{ steps.build-meta.outputs.commit_sha }}
            APP_BUILD_TIME=${{ steps.build-meta.outputs.build_time }}
            VITE_APP_COMMIT_SHA=${{ steps.build-meta.outputs.commit_sha }}
            VITE_APP_BUILD_TIME=${{ steps.build-meta.outputs.build_time }}
          tags: |
            ghcr.io/nekomatasub/nekomorto:latest
            ghcr.io/nekomatasub/nekomorto:sha-${{ github.sha }}
