name: Deploy Production Reusable

on:
  workflow_call:
    inputs:
      image_tag:
        description: Optional image tag to deploy (latest or sha-<40hex>).
        required: false
        type: string
        default: ""
    secrets:
      PROD_DEPLOY_PATH:
        required: true
      PROD_HOST:
        required: true
      PROD_PORT:
        required: false
      PROD_SSH_KEY:
        required: true
      PROD_USER:
        required: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: Production
    permissions:
      contents: read
    steps:
      - name: Resolve image tag
        id: resolve-image
        shell: bash
        env:
          INPUT_TAG: ${{ inputs.image_tag }}
        run: |
          if [ -n "${INPUT_TAG}" ]; then
            if [[ ! "${INPUT_TAG}" =~ ^(latest|sha-[0-9a-f]{40})$ ]]; then
              echo "Invalid image_tag: ${INPUT_TAG}" >&2
              echo "Allowed values: latest or sha-<40 lowercase hex chars>" >&2
              exit 1
            fi
            RESOLVED_TAG="${INPUT_TAG}"
          else
            RESOLVED_TAG="sha-${{ github.sha }}"
          fi

          echo "image_repo=ghcr.io/nekomatasub/nekomorto" >> "${GITHUB_OUTPUT}"
          echo "image_tag=${RESOLVED_TAG}" >> "${GITHUB_OUTPUT}"

      - name: Validate production deploy secrets
        shell: bash
        env:
          PROD_DEPLOY_PATH: ${{ secrets.PROD_DEPLOY_PATH }}
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_PORT: ${{ secrets.PROD_PORT }}
          PROD_SSH_KEY: ${{ secrets.PROD_SSH_KEY }}
          PROD_USER: ${{ secrets.PROD_USER }}
        run: |
          missing=()
          for name in PROD_HOST PROD_USER PROD_SSH_KEY PROD_DEPLOY_PATH; do
            if [ -z "${!name}" ]; then
              missing+=("${name}")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Missing required Production environment secret(s): %s\n' "$(IFS=', '; echo "${missing[*]}")" >&2
            echo "Set them in GitHub Settings > Environments > Production > Environment secrets." >&2
            exit 1
          fi

          if [ -n "${PROD_PORT}" ] && [[ ! "${PROD_PORT}" =~ ^[0-9]+$ ]]; then
            echo "Invalid PROD_PORT: expected a numeric SSH port." >&2
            exit 1
          fi

          if [[ ! "${PROD_DEPLOY_PATH}" =~ ^/[A-Za-z0-9._~+@%/=-]+$ ]]; then
            echo "Invalid PROD_DEPLOY_PATH: expected an absolute Unix path without spaces or shell metacharacters." >&2
            exit 1
          fi

      - name: Configure SSH
        shell: bash
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_PORT: ${{ secrets.PROD_PORT }}
          PROD_SSH_KEY: ${{ secrets.PROD_SSH_KEY }}
        run: |
          PORT="${PROD_PORT}"
          if [ -z "${PORT}" ]; then
            PORT=22
          fi

          install -m 700 -d ~/.ssh
          printf '%s\n' "${PROD_SSH_KEY}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${PORT}" "${PROD_HOST}" >> ~/.ssh/known_hosts

      - name: Run remote deploy
        shell: bash
        env:
          PROD_DEPLOY_PATH: ${{ secrets.PROD_DEPLOY_PATH }}
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_PORT: ${{ secrets.PROD_PORT }}
          PROD_USER: ${{ secrets.PROD_USER }}
          IMAGE_REPO: ${{ steps.resolve-image.outputs.image_repo }}
          IMAGE_TAG: ${{ steps.resolve-image.outputs.image_tag }}
        run: |
          PORT="${PROD_PORT}"
          if [ -z "${PORT}" ]; then
            PORT=22
          fi

          ssh -o StrictHostKeyChecking=yes -p "${PORT}" "${PROD_USER}@${PROD_HOST}" \
            "cd '${PROD_DEPLOY_PATH}' && git fetch --prune origin && git checkout main && git reset --hard origin/main && DEPLOY_PATH='${PROD_DEPLOY_PATH}' DEPLOY_BRANCH='main' SKIP_GIT_SYNC='true' APP_IMAGE_REPO='${IMAGE_REPO}' APP_IMAGE_TAG='${IMAGE_TAG}' bash '${PROD_DEPLOY_PATH}/ops/prod/deploy-prod.sh'"
