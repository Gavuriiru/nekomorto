name: Deploy Production Reusable

on:
  workflow_call:
    inputs:
      image_tag:
        description: Optional image tag to deploy (latest or sha-<40hex>).
        required: false
        type: string
        default: ""
    secrets:
      PROD_DEPLOY_PATH:
        required: false
      PROD_HOST:
        required: false
      PROD_PORT:
        required: false
      PROD_SSH_KEY:
        required: false
      PROD_USER:
        required: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
    steps:
      - name: Resolve image tag
        id: resolve-image
        shell: bash
        env:
          INPUT_TAG: ${{ inputs.image_tag }}
        run: |
          if [ -n "${INPUT_TAG}" ]; then
            if [[ ! "${INPUT_TAG}" =~ ^(latest|sha-[0-9a-f]{40})$ ]]; then
              echo "Invalid image_tag: ${INPUT_TAG}" >&2
              echo "Allowed values: latest or sha-<40 lowercase hex chars>" >&2
              exit 1
            fi
            RESOLVED_TAG="${INPUT_TAG}"
          else
            RESOLVED_TAG="sha-${{ github.sha }}"
          fi

          echo "image_repo=ghcr.io/nekomatasub/nekomorto" >> "${GITHUB_OUTPUT}"
          echo "image_tag=${RESOLVED_TAG}" >> "${GITHUB_OUTPUT}"

      - name: Configure SSH
        shell: bash
        run: |
          PORT="${{ secrets.PROD_PORT }}"
          if [ -z "${PORT}" ]; then
            PORT=22
          fi

          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.PROD_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${PORT}" "${{ secrets.PROD_HOST }}" >> ~/.ssh/known_hosts

      - name: Run remote deploy
        shell: bash
        run: |
          PORT="${{ secrets.PROD_PORT }}"
          if [ -z "${PORT}" ]; then
            PORT=22
          fi

          IMAGE_REPO="${{ steps.resolve-image.outputs.image_repo }}"
          IMAGE_TAG="${{ steps.resolve-image.outputs.image_tag }}"

          ssh -o StrictHostKeyChecking=yes -p "${PORT}" "${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }}" \
            "cd '${{ secrets.PROD_DEPLOY_PATH }}' && git fetch --prune origin && git checkout main && git reset --hard origin/main && DEPLOY_PATH='${{ secrets.PROD_DEPLOY_PATH }}' DEPLOY_BRANCH='main' SKIP_GIT_SYNC='true' APP_IMAGE_REPO='${IMAGE_REPO}' APP_IMAGE_TAG='${IMAGE_TAG}' bash '${{ secrets.PROD_DEPLOY_PATH }}/ops/prod/deploy-prod.sh'"
