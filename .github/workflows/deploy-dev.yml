name: Deploy Development

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Optional image tag to deploy (sha-<40hex>). Leave empty to deploy current commit."
        required: false
        type: string

concurrency:
  group: deploy-development
  cancel-in-progress: true

jobs:
  build_and_push:
    if: ${{ github.event.inputs.image_tag == '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve build metadata
        id: build-meta
        shell: bash
        run: |
          echo "commit_sha=${GITHUB_SHA}" >> "${GITHUB_OUTPUT}"
          echo "build_time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "${GITHUB_OUTPUT}"

      - name: Build and push app image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          build-args: |
            APP_COMMIT_SHA=${{ steps.build-meta.outputs.commit_sha }}
            APP_BUILD_TIME=${{ steps.build-meta.outputs.build_time }}
            VITE_APP_COMMIT_SHA=${{ steps.build-meta.outputs.commit_sha }}
            VITE_APP_BUILD_TIME=${{ steps.build-meta.outputs.build_time }}
          tags: |
            ghcr.io/nekomatasub/nekomorto:sha-${{ github.sha }}

  deploy:
    needs:
      - build_and_push
    if: ${{ always() && (needs.build_and_push.result == 'success' || needs.build_and_push.result == 'skipped') }}
    runs-on: ubuntu-latest
    environment: development
    permissions:
      contents: read
    steps:
      - name: Resolve image tag
        id: resolve-image
        shell: bash
        env:
          INPUT_TAG: ${{ github.event.inputs.image_tag || '' }}
        run: |
          if [ -n "${INPUT_TAG}" ]; then
            if [[ ! "${INPUT_TAG}" =~ ^sha-[0-9a-f]{40}$ ]]; then
              echo "Invalid image_tag: ${INPUT_TAG}" >&2
              echo "Allowed values: sha-<40 lowercase hex chars>" >&2
              exit 1
            fi
            RESOLVED_TAG="${INPUT_TAG}"
          else
            RESOLVED_TAG="sha-${{ github.sha }}"
          fi

          echo "image_repo=ghcr.io/nekomatasub/nekomorto" >> "${GITHUB_OUTPUT}"
          echo "image_tag=${RESOLVED_TAG}" >> "${GITHUB_OUTPUT}"

      - name: Configure SSH
        shell: bash
        run: |
          PORT="${{ secrets.DEV_PORT }}"
          if [ -z "${PORT}" ]; then
            PORT=22
          fi

          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.DEV_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${PORT}" "${{ secrets.DEV_HOST }}" >> ~/.ssh/known_hosts

      - name: Run remote deploy
        shell: bash
        run: |
          PORT="${{ secrets.DEV_PORT }}"
          if [ -z "${PORT}" ]; then
            PORT=22
          fi

          IMAGE_REPO="${{ steps.resolve-image.outputs.image_repo }}"
          IMAGE_TAG="${{ steps.resolve-image.outputs.image_tag }}"

          ssh -o StrictHostKeyChecking=yes -p "${PORT}" "${{ secrets.DEV_USER }}@${{ secrets.DEV_HOST }}" \
            "cd '${{ secrets.DEV_DEPLOY_PATH }}' && git fetch --prune origin && git checkout main && git reset --hard origin/main && DEPLOY_PATH='${{ secrets.DEV_DEPLOY_PATH }}' DEPLOY_BRANCH='main' ENV_FILE='.env.dev' HEALTHCHECK_BASE_URL='https://dev.nekomata.moe' SKIP_GIT_SYNC='true' APP_IMAGE_REPO='${IMAGE_REPO}' APP_IMAGE_TAG='${IMAGE_TAG}' bash '${{ secrets.DEV_DEPLOY_PATH }}/ops/dev/deploy-dev.sh'"
